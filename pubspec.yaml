name: universal_flutter_utils

description: >-
  Flutter UI toolkit with widgets, Dio API helpers, Firebase auth, file pickers,
  validators, themes, socket.io, maps, and cross-platform utilities.
version: 0.0.10

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

homepage: https://github.com/dawasim/universal_flutter_utils
repository: https://github.com/dawasim/universal_flutter_utils
issue_tracker: https://github.com/dawasim/universal_flutter_utils/issues

topics:
  - widgets
  - utilities
  - ui
  - networking
  - authentication

license: MIT

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_svg: ^2.3.0
  pinput: ^6.0.2
  fluttertoast: ^9.1.0

  shimmer_animation: ^2.2.2+1
  scroll_to_index: ^3.0.1

  intl: ^0.20.3
  get: ^4.7.3
  shared_preferences: ^2.5.5

  path_provider: ^2.1.6
  file_picker: ^12.0.0-beta.5
  permission_handler: ^12.0.3
  image_picker: ^1.2.3
  image: ^4.9.1
  custom_image_crop: ^0.1.1
  audio_waveforms: ^2.0.2
  flutter_native_contact_picker: ^0.0.12
  open_filex: ^4.7.0
  package_info_plus: ^10.2.0

  # Location
  map_location_picker: ^3.1.0
  location: ^8.0.1
  form_builder_extra_fields: ^12.0.0

  # Display share prompt
  share_plus: ^13.2.0

  ## Server communication
  http: ^1.6.0
  dio: ^5.10.0
  socket_io_client: ^3.1.6
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  flutter_widget_from_html_core: ^0.17.2
  geolocator: ^14.0.3
  flutter_typeahead: ^5.2.0

  # Video Player
  chewie: ^1.14.1
  video_player: ^2.11.1

  encrypt: ^5.0.3
  convert: ^3.1.2
  crypto: ^3.0.7
  path: ^1.9.1
  html: ^0.15.6
  flutter_html: ^3.0.0

  # Biometric Recognition
  local_auth: ^3.0.1

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_crashlytics: ^5.2.4

  # Push Notifications
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1

  # Social login
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  flutter_login_facebook: ^4.0.0

  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

